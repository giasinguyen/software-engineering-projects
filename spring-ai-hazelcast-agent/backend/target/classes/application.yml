server:
  port: 8080

spring:
  application:
    name: cache-agent

# Hazelcast Cloud Configuration
hazelcast:
  cloud:
    cluster-name: demo-architecture
    discovery-token: Df4b2ytm17EknK1Du8Q0YhjRJgtBAI99PriG0pIoOhrJXhq2P5l099a6qKHuTq6l
  cache:
    map-name: app-cache
    ttl-seconds: 300
    max-size: 10000

# Read Service
read-service:
  base-url: ${READ_SERVICE_URL:http://localhost:8081}
  timeout-ms: 3000

# Write Service
write-service:
  base-url: ${WRITE_SERVICE_URL:http://localhost:8082}
  timeout-ms: 5000

# Logging
logging:
  level:
    com.example.cacheagent: DEBUG
    com.hazelcast: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
