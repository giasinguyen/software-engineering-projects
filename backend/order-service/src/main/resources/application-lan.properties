# ============================================================
# PROFILE: LAN - Dùng khi chạy thật trên mạng nội bộ
# Chạy lệnh: .\mvnw spring-boot:run -Dspring-boot.run.profiles=lan
# ============================================================

server.port=8083

# MongoDB: dùng chung Atlas cluster với các service khác
spring.data.mongodb.uri=mongodb+srv://products:admin@mini-food-system.hbvvgpd.mongodb.net/minifood?retryWrites=true&w=majority&appName=mini-food-system

# ⚠️ ĐIỀN IP THẬT CỦA TỪNG MÁY Ở ĐÂY (dùng lệnh ipconfig để lấy IPv4):
# Người 2 – User Service (máy chạy user-service port 8081)
app.user-service.url=http://REPLACE_WITH_USER_SERVICE_IP:8081

# Người 3 – Food Service (máy chạy food-service port 8082)
app.food-service.url=http://REPLACE_WITH_FOOD_SERVICE_IP:8082

# CORS: cho phép Frontend gọi vào (máy chạy React, port 5173 mặc định của Vite)
app.cors.allowed-origins=http://REPLACE_WITH_FRONTEND_IP:5173,http://REPLACE_WITH_FRONTEND_IP:3000
