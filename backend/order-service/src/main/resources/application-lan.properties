# ============================================================
# PROFILE: LAN - Dùng khi chạy thật trên mạng nội bộ
# Mỗi thành viên điền IP thật của các máy trong team vào đây
# ============================================================

server.port=8083

# MongoDB: chạy trên máy người 4 (máy bạn) - giữ localhost
spring.data.mongodb.uri=mongodb://localhost:27017/orderdb

# ⚠️ CHỈNH IP THẬT CỦA TỪNG MÁY Ở ĐÂY:
# Người 2 – User Service
app.user-service.url=http://192.168.1.101:8081

# Người 3 – Food Service
app.food-service.url=http://192.168.1.102:8082

# CORS: cho phép Frontend (máy người 1) gọi vào
# Điền IP thật máy người 1 chạy React (port 5173 là default của Vite)
app.cors.allowed-origins=http://192.168.1.100:5173,http://192.168.1.100:3000
