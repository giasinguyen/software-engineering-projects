server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  rabbitmq:
    uri: ${RABBITMQ_URI}

app:
  rabbitmq:
    exchange: movie.ticket.exchange
    routing-key:
      user-registered: user.registered
