version: "3.8"

services:
  # ─────────────────────────────────────────
  # MongoDB  →  :27017
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: minifood
    volumes:
      - mongo-data:/data/db
    networks:
      - minifood-net
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # User Service  →  :8081
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/minifood
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Food Service  →  :8082
  # ─────────────────────────────────────────
  food-service:
    build:
      context: ./backend/food-service
    container_name: food-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/minifood
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Order Service  →  :8083
  # Gọi nội bộ: user-service:8081 & food-service:8082
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/minifood
      SPRING_PROFILES_ACTIVE: docker
      APP_USER_SERVICE_URL: http://user-service:8081
      APP_FOOD_SERVICE_URL: http://food-service:8082
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started
      food-service:
        condition: service_started
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Payment Service  →  :8084  (Node.js)
  # Gọi nội bộ: order-service:8083
  # ─────────────────────────────────────────
  payment-service:
    build:
      context: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      MONGO_URI: mongodb://mongo:27017/minifood
      ORDER_SERVICE: http://order-service:8083
      JWT_SECRET: ZjQ3MTRkMjgtYjk1MS00ZGE3LTk2MzAtNWU3MjY0MTcyZDBlMTIzNDU2Nzg5MGFiY2RlZg==
    depends_on:
      mongo:
        condition: service_healthy
      order-service:
        condition: service_started
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # API Gateway  →  :8080
  # Single entry point cho tất cả services
  # ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      FOOD_SERVICE_URL: http://food-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
    depends_on:
      - user-service
      - food-service
      - order-service
      - payment-service
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend  →  :80  (React → Nginx)
  # Gọi qua API Gateway tại :8080
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - minifood-net
    restart: unless-stopped

# ─────────────────────────────────────────
# Network nội bộ cho inter-service calls
# ─────────────────────────────────────────
networks:
  minifood-net:

volumes:
  mongo-data:
