version: "3.8"

services:
  # ─────────────────────────────────────────
  # User Service  →  :8081
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Food Service  →  :8082
  # ─────────────────────────────────────────
  food-service:
    build:
      context: ./backend/food-service
    container_name: food-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Order Service  →  :8083
  # Gọi nội bộ: user-service:8081 & food-service:8082
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./backend/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
      # Override localhost → container names (Spring Boot relaxed binding)
      APP_USER_SERVICE_URL: http://user-service:8081
      APP_FOOD_SERVICE_URL: http://food-service:8082
    depends_on:
      - user-service
      - food-service
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Payment Service  →  :8084  (Node.js)
  # Gọi nội bộ: order-service:8083
  # ─────────────────────────────────────────
  payment-service:
    build:
      context: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      MONGO_URI: ${MONGO_URI}
      ORDER_SERVICE: http://order-service:8083
    depends_on:
      - order-service
    networks:
      - minifood-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Frontend  →  :80  (React → Nginx)
  # Browser gọi trực tiếp localhost:PORT nên
  # VITE_* dùng default localhost là đúng
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - user-service
      - food-service
      - order-service
      - payment-service
    networks:
      - minifood-net
    restart: unless-stopped

# ─────────────────────────────────────────
# Network nội bộ cho inter-service calls
# ─────────────────────────────────────────
networks:
  minifood-net:
    driver: bridge
